syntax = "proto3";

package core;

option go_package = "proto/core;corepb";

message Ticket {
  int64 id = 1;
  int64 user_id = 2;
  string message = 3;
  string category = 4;
  string status = 5;
  int64 specialist_id = 6;
  string created_at = 7;
}

message CreateTicketRequest {
  int64 user_id = 1;
  string message = 2;
}

message CreateTicketResponse {
  Ticket ticket = 1;
}

message GetTicketRequest {
  int64 id = 1;
}

message GetTicketResponse {
  Ticket ticket = 1;
}

message ListTicketsRequest {
  optional int64 user_id = 1;
  optional int64 specialist_id = 6;
}

message ListTicketsResponse {
  repeated Ticket tickets = 1;
}

message AssignTicketRequest {
  int64 ticket_id = 1;
  int64 specialist_id = 2;
}

message AssignTicketResponse {
  Ticket ticket = 1;
}

message CloseTicketRequest {
  int64 ticket_id = 1;
}

message CloseTicketResponse {
  Ticket ticket = 1;
}

message User {
  int64 id = 1;
  string name = 2;
  string email = 3;
  string created_at = 4;
  bool is_specialist = 5;
}

message RegisterUserRequest {
  string name = 1;
  string email = 2;
  string password = 3;
}

message RegisterUserResponse {
  User user = 1;
}

message LoginUserRequest {
  string email = 1;
  string password = 2;
}

message LoginUserResponse {
  User user = 1;
}

message GetUserRequest {
  int64 id = 1;
}

message GetUserResponse {
  User user = 1;
}

service CoreService {
  rpc CreateTicket(CreateTicketRequest) returns (CreateTicketResponse);
  rpc GetTicket(GetTicketRequest) returns (GetTicketResponse);
  rpc ListTickets(ListTicketsRequest) returns (ListTicketsResponse);
  rpc AssignTicket(AssignTicketRequest) returns (AssignTicketResponse);
  rpc CloseTicket(CloseTicketRequest) returns (CloseTicketResponse);


  rpc RegisterUser(RegisterUserRequest) returns (RegisterUserResponse);
  rpc LoginUser(LoginUserRequest) returns (LoginUserResponse);
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}