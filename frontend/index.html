<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support Desk</title>
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
<div class="landing">
    <div class="landing-card auth-card">
        <h1>Support Desk</h1>
        <p>Войдите в систему или зарегистрируйтесь.</p>

        <div class="auth-tabs">
            <button id="loginTabBtn" class="tab-button active" type="button">Вход</button>
            <button id="registerTabBtn" class="tab-button" type="button">Регистрация</button>
        </div>

        <form id="loginForm" class="auth-form">
            <label for="loginEmail">Email</label>
            <input id="loginEmail" type="email" placeholder="Введите email" />

            <label for="loginPassword">Пароль</label>
            <input id="loginPassword" type="password" placeholder="Введите пароль" />

            <button class="full" type="submit">Войти</button>
        </form>

        <form id="registerForm" class="auth-form hidden">
            <label for="registerName">Имя</label>
            <input id="registerName" type="text" placeholder="Введите имя" />

            <label for="registerEmail">Email</label>
            <input id="registerEmail" type="email" placeholder="Введите email" />

            <label for="registerPassword">Пароль</label>
            <input id="registerPassword" type="password" placeholder="Введите пароль" />

            <button class="full" type="submit">Зарегистрироваться</button>
        </form>

        <div id="authMessage" class="auth-message"></div>
    </div>
</div>

<script src="./common.js"></script>
<script src="./auth.js"></script>
</body>
</html>
